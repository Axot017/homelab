name: Build vibe image

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - docker/vibe/**
      - .github/workflows/build-vibe.yaml

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: axot017/vibe

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Resolve opencode version
        id: opencode
        run: |
          OPENCODE_VERSION="$(npm view opencode-ai version)"
          OPENCODE_VERSION="${OPENCODE_VERSION//+/-}"
          SHORT_SHA="${GITHUB_SHA::12}"
          DEPLOY_TAG="opencode-${OPENCODE_VERSION}-sha-${SHORT_SHA}-run-${GITHUB_RUN_NUMBER}"
          echo "opencode_version=${OPENCODE_VERSION}" >> "${GITHUB_OUTPUT}"
          echo "deploy_tag=${DEPLOY_TAG}" >> "${GITHUB_OUTPUT}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha
            type=raw,value=${{ steps.opencode.outputs.deploy_tag }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: docker/vibe
          file: docker/vibe/Dockerfile
          pull: true
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            OPENCODE_VERSION=${{ steps.opencode.outputs.opencode_version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Update deployment image tag
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path("k8s/apps/base/homelab/vibe/deployment.yaml")
          tag = "${{ steps.opencode.outputs.deploy_tag }}"
          image = f"ghcr.io/axot017/vibe:{tag}"
          lines = path.read_text().splitlines()
          updated = []
          for line in lines:
              stripped = line.lstrip()
              if stripped.startswith("image:"):
                  indent = line[:len(line) - len(stripped)]
                  updated.append(f"{indent}image: {image}")
              else:
                  updated.append(line)
          path.write_text("\n".join(updated) + "\n")
          PY

      - name: Commit deployment update
        run: |
          if git diff --quiet -- k8s/apps/base/homelab/vibe/deployment.yaml; then
            echo "No deployment update needed"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add k8s/apps/base/homelab/vibe/deployment.yaml
          git commit -m "chore(vibe): bump image to ${{ steps.opencode.outputs.deploy_tag }}"
          git push
