name: Build vibe image

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'
  push:
    branches:
      - main
    paths:
      - docker/vibe/**
      - .github/workflows/build-vibe.yaml

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: axot017/vibe

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Resolve latest opencode version
        id: opencode
        run: |
          VERSION="$(npm view opencode-ai version)"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Check if version tag already exists
        id: tag_check
        run: |
          IMAGE_REF="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.opencode.outputs.version }}"
          if docker manifest inspect "${IMAGE_REF}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Decide whether to build
        id: build_gate
        run: |
          if [ "${{ github.event_name }}" = "schedule" ] && [ "${{ steps.tag_check.outputs.exists }}" = "true" ]; then
            echo "should_build=false" >> "$GITHUB_OUTPUT"
          else
            echo "should_build=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Docker metadata
        id: meta
        if: steps.build_gate.outputs.should_build == 'true'
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ steps.opencode.outputs.version }}
            type=raw,value=latest
            type=sha

      - name: Build and push
        if: steps.build_gate.outputs.should_build == 'true'
        uses: docker/build-push-action@v6
        with:
          context: docker/vibe
          file: docker/vibe/Dockerfile
          push: true
          build-args: |
            OPENCODE_VERSION=${{ steps.opencode.outputs.version }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
