apiVersion: tekton.dev/v1
kind: PipelineRun
metadata:
  generateName: repo-checks-
  annotations:
    pipelinesascode.tekton.dev/on-event: "[pull_request, push]"
    pipelinesascode.tekton.dev/on-target-branch: "[main]"
    pipelinesascode.tekton.dev/cancel-in-progress: "true"
    pipelinesascode.tekton.dev/max-keep-runs: "3"
spec:
  params:
    - name: repo-url
      value: "{{ repo_url }}"
    - name: revision
      value: "{{ revision }}"
    - name: git-auth-secret
      value: "{{ git_auth_secret }}"
  workspaces:
    - name: source
      volumeClaimTemplate:
        spec:
          accessModes:
            - ReadWriteOnce
          resources:
            requests:
              storage: 2Gi
  pipelineSpec:
    params:
      - name: repo-url
        type: string
      - name: revision
        type: string
      - name: git-auth-secret
        type: string
    workspaces:
      - name: source
    tasks:
      - name: clone
        taskSpec:
          params:
            - name: repo-url
              type: string
            - name: revision
              type: string
            - name: git-auth-secret
              type: string
          workspaces:
            - name: output
          steps:
            - name: clone
              image: docker.io/alpine/git:2.47.2
              env:
                - name: GIT_TOKEN
                  valueFrom:
                    secretKeyRef:
                      name: $(params.git-auth-secret)
                      key: git-provider-token
              script: |
                set -eu
                repo_url="$(params.repo-url)"
                repo_dir="$(workspaces.output.path)/repo"
                authed_url=$(printf '%s' "$repo_url" | sed "s#https://#https://x-access-token:${GIT_TOKEN}@#")
                rm -rf "$repo_dir"
                git clone "$authed_url" "$repo_dir"
                cd "$repo_dir"
                git checkout "$(params.revision)"
        params:
          - name: repo-url
            value: $(params.repo-url)
          - name: revision
            value: $(params.revision)
          - name: git-auth-secret
            value: $(params.git-auth-secret)
        workspaces:
          - name: output
            workspace: source
      - name: validate-flux
        runAfter:
          - clone
        taskSpec:
          workspaces:
            - name: source
          steps:
            - name: validate
              image: ghcr.io/fluxcd/flux-cli:v2.6.4
              workingDir: $(workspaces.source.path)/repo
              script: |
                set -eu
                tmp_repo=/tmp/repo
                rm -rf "$tmp_repo"
                cp -a . "$tmp_repo"
                flux build kustomization flux-system \
                  --path "$tmp_repo/k8s/clusters/homelab" \
                  --kustomization-file "$tmp_repo/k8s/clusters/homelab/flux-system/gotk-sync.yaml" \
                  --dry-run
        workspaces:
          - name: source
            workspace: source
      - name: validate-opentofu
        runAfter:
          - clone
        taskSpec:
          workspaces:
            - name: source
          steps:
            - name: fmt-validate
              image: ghcr.io/opentofu/opentofu:1.10.6
              workingDir: $(workspaces.source.path)/repo/infra/opentofu
              script: |
                set -eu
                tofu fmt -check -recursive
                tofu init -backend=false
                tofu validate
        workspaces:
          - name: source
            workspace: source
