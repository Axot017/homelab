apiVersion: apps/v1
kind: Deployment
metadata:
  name: vibe
  namespace: vibe
  labels:
    app: vibe
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vibe
  template:
    metadata:
      labels:
        app: vibe
    spec:
      containers:
        - name: vibe
          image: ghcr.io/axot017/vibe:1.4.7
          imagePullPolicy: IfNotPresent
          securityContext:
            privileged: true
          env:
            - name: OPENCODE_PORT
              value: "3000"
            - name: DOCKER_HOST
              value: unix:///var/run/docker.sock
          envFrom:
            - secretRef:
                name: vibe-env
                optional: true
            - secretRef:
                name: aws-cli-credentials
                optional: true
          ports:
            - name: opencode
              containerPort: 3000
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 600
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 60
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 900
            periodSeconds: 20
            timeoutSeconds: 2
            failureThreshold: 60
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
              ephemeral-storage: 512Mi
            limits:
              cpu: 4000m
              memory: 8Gi
              ephemeral-storage: 4Gi
          volumeMounts:
            - name: vibe-data
              mountPath: /workspace
              subPath: workspace
            - name: vibe-data
              mountPath: /root/.local/share/opencode
              subPath: opencode
            - name: docker-socket
              mountPath: /var/run
        - name: dind
          image: docker:29-dind
          imagePullPolicy: IfNotPresent
          securityContext:
            privileged: true
          env:
            - name: DOCKER_TLS_CERTDIR
              value: ""
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - docker info >/dev/null 2>&1
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
              ephemeral-storage: 1Gi
            limits:
              cpu: 2000m
              memory: 4Gi
              ephemeral-storage: 8Gi
          volumeMounts:
            - name: docker-socket
              mountPath: /var/run
            - name: docker-data
              mountPath: /var/lib/docker
      volumes:
        - name: vibe-data
          persistentVolumeClaim:
            claimName: vibe-data
        - name: docker-socket
          emptyDir: {}
        - name: docker-data
          emptyDir: {}
