apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: harbor-postgres
  namespace: harbor
spec:
  instances: 1

  storage:
    storageClass: longhorn
    size: 3Gi

  postgresql:
    parameters:
      shared_buffers: "256MB"
      effective_cache_size: "512MB"

  bootstrap:
    initdb:
      database: registry
      owner: harbor

  resources:
    requests:
      memory: "256Mi"
      cpu: "100m"
    limits:
      memory: "1Gi"
      cpu: "1"
---
apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: harbor-postgres
  namespace: harbor
spec:
  selector:
    matchLabels:
      cnpg.io/cluster: harbor-postgres
  podMetricsEndpoints:
    - port: metrics
