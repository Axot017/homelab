apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: harbor
  namespace: harbor
spec:
  interval: 10m
  chart:
    spec:
      chart: harbor
      version: 1.18.2
      sourceRef:
        kind: HelmRepository
        name: harbor
        namespace: flux-system
      interval: 10m
  values:
    expose:
      type: route
      tls:
        enabled: false
        certSource: none
      route:
        parentRefs:
          - group: gateway.networking.k8s.io
            kind: Gateway
            name: homelab-gateway
            namespace: envoy-gateway-system
            sectionName: http
        hosts:
          - harbor.mateuszledwon.com
    externalURL: http://harbor.mateuszledwon.com
    updateStrategy:
      type: Recreate
    database:
      type: external
      external:
        host: harbor-postgres-rw.harbor.svc.cluster.local
        port: "5432"
        username: harbor
        coreDatabase: registry
        existingSecret: harbor-postgres-app
        sslmode: disable
    redis:
      type: external
      external:
        addr: harbor-valkey-primary.harbor.svc.cluster.local:6379
        existingSecret: harbor-valkey-credentials
    persistence:
      persistentVolumeClaim:
        registry:
          storageClass: longhorn
          size: 10Gi
        jobservice:
          jobLog:
            storageClass: longhorn
            size: 1Gi
    trivy:
      enabled: false
    metrics:
      enabled: false
