apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: harbor-valkey
  namespace: harbor
spec:
  interval: 10m
  chartRef:
    kind: OCIRepository
    name: valkey
    namespace: flux-system
  values:
    architecture: standalone
    auth:
      enabled: true
      existingSecret: harbor-valkey-credentials
      existingSecretPasswordKey: redis-password
    primary:
      persistence:
        enabled: true
        storageClass: longhorn
        size: 2Gi

      resources:
        requests:
          cpu: 50m
          memory: 64Mi
        limits:
          cpu: 500m
          memory: 256Mi
    replica:
      replicaCount: 0

    sentinel:
      enabled: false

    metrics:
      enabled: true
      serviceMonitor:
        enabled: true
        namespace: harbor
